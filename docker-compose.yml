# Local stack: API, MLflow, Postgres (Airflow metadata), Airflow scheduler + web UI (port 8080).
# Usage: `docker compose up -d` then open http://localhost:8080 (admin / admin) and http://localhost:5000 (MLflow).

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 5s
      retries: 5
      start_period: 5s

  api:
    build:
      context: .
      dockerfile: Dockerfile.fastapi
    ports:
      - "8000:8000"
    depends_on:
      mlflow:
        condition: service_healthy
    environment:
      HPP_LOG_LEVEL: INFO
      HPP_RAW_DATA_DIR: /app/data/raw
      HPP_MODEL_OUTPUT_DIR: /app/model
      HPP_LOCAL_MODEL_PATH: /app/model/best_model.joblib
      HPP_MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_TRACKING_URI: http://mlflow:5000
    volumes:
      - ./data:/app/data
      - ./model:/app/model
      - mlflow_data:/srv/mlflow_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  mlflow:
    build:
      context: .
      dockerfile: Dockerfile.mlflow
    # Entry (root): mkdir + chown volume to AIRFLOW_UID, then gosu → MLflow runs as same UID as Airflow (see Dockerfile.mlflow).
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/srv/mlflow_data
    environment:
      MLFLOW_BACKEND_STORE_URI: sqlite:////srv/mlflow_data/mlflow.db
      MLFLOW_SERVER_ALLOWED_HOSTS: mlflow:*,localhost:*,127.0.0.1:*
      AIRFLOW_UID: "${AIRFLOW_UID:-50000}"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/')",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    # UID from host .env / shell (${AIRFLOW_UID:-50000}); must match chown/gosu and Airflow user.
    command:
      - sh
      - -c
      - |
        set -e
        mkdir -p /srv/mlflow_data/artifacts
        chown -R ${AIRFLOW_UID:-50000}:0 /srv/mlflow_data
        exec gosu ${AIRFLOW_UID:-50000} mlflow server --host 0.0.0.0 --port 5000 \
          --allowed-hosts mlflow:*,localhost:*,127.0.0.1:* \
          --backend-store-uri sqlite:////srv/mlflow_data/mlflow.db \
          --default-artifact-root /srv/mlflow_data/artifacts

  # --- Apache Airflow (LocalExecutor): init once, then scheduler + webserver ---
  airflow-init:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    user: "${AIRFLOW_UID:-50000}:0"
    depends_on:
      postgres:
        condition: service_healthy
    environment: &airflow-env
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      # Dev-only keys; replace in production.
      AIRFLOW__CORE__FERNET_KEY: "FP6kZaBmLfqNDEu6BkuUJRhvI1DSQiZeUuXAwQYTzec="
      AIRFLOW__WEBSERVER__SECRET_KEY: "house-price-local-dev-secret-change-me"
      PYTHONPATH: /opt/airflow/project
      # Project paths (same as airflow_tasks / training)
      HPP_RAW_DATA_DIR: /opt/airflow/project/data/raw
      HPP_MODEL_OUTPUT_DIR: /opt/airflow/project/model
      HPP_LOCAL_MODEL_PATH: /opt/airflow/project/model/best_model.joblib
      HPP_USE_MLFLOW: "true"
      HPP_MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_TRACKING_URI: http://mlflow:5000
      HPP_BATCH_OUTPUT: /opt/airflow/project/data/processed/batch_predictions.csv
      HPP_MONITORING_OUTPUT_DIR: /opt/airflow/project/reports/monitoring
      HPP_MONITOR_REPORTS_DIR: /opt/airflow/project/monitor/reports
    volumes: &airflow-volumes
      # Same path + volume as MLflow so file-backed run artifacts resolve locally (see README).
      - mlflow_data:/srv/mlflow_data
      - ./dags:/opt/airflow/dags
      - ./data:/opt/airflow/project/data
      - ./model:/opt/airflow/project/model
      - ./config:/opt/airflow/project/config
      - ./reports:/opt/airflow/project/reports
      - ./monitor/reports:/opt/airflow/project/monitor/reports
    working_dir: /opt/airflow/project
    entrypoint: /bin/bash
    command:
      - -c
      - |
        set -e
        airflow db migrate
        airflow users create \
          --username admin \
          --password admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com \
          || true
    restart: "no"

  airflow-scheduler:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    user: "${AIRFLOW_UID:-50000}:0"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      mlflow:
        condition: service_healthy
    environment: *airflow-env
    volumes: *airflow-volumes
    working_dir: /opt/airflow/project
    command: scheduler

  airflow-webserver:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    user: "${AIRFLOW_UID:-50000}:0"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      mlflow:
        condition: service_healthy
    environment: *airflow-env
    volumes: *airflow-volumes
    working_dir: /opt/airflow/project
    ports:
      - "8080:8080"
    command: webserver
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

volumes:
  postgres_data:
  mlflow_data:
