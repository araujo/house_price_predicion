# Continuous integration: lint, tests (incl. DAG import test via pytest), Docker API smoke build.
# Triggers: pull_request targeting main, push to main.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install project dependencies
        run: pip install -e ".[dev,airflow]"

      - name: Run Ruff linter
        run: ruff check .

      # Includes tests/test_airflow_dags.py (DAG import check when apache-airflow is installed).
      - name: Run pytest
        run: pytest tests/ -q

      # Ensures the API Dockerfile stays buildable without publishing an image.
      - name: Validate Docker build (FastAPI image)
        run: docker build -f Dockerfile.fastapi -t house-price-api:ci .
